name: Monthly Program & Data Accuracy Audit

on:
  schedule:
    # Runs at 9am PST on the 1st of every month
    - cron: '0 17 1 * *'
  workflow_dispatch: # Manual trigger from GitHub Actions tab

jobs:
  audit-programs:
    name: Check Rebate Program Status
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run program status checker
        id: check
        continue-on-error: true
        run: node scripts/check-programs.mjs 2>&1 | tee /tmp/audit-output.txt

      - name: Create issue if programs flagged
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/audit-output.txt', 'utf8');
            const now = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Monthly Audit: Program status issues detected (${now})`,
              body: `## Automated Monthly Audit — ${now}\n\nThe program status checker found issues that need review.\n\n### Checker Output\n\n\`\`\`\n${output}\n\`\`\`\n\n### Action Required\n\n1. Open \`src/data/programs.ts\`\n2. Update the status of any flagged programs\n3. Update \`lastVerified\` dates for confirmed programs\n4. Run \`npm run build\` to propagate changes\n5. Push to main\n\n---\n*This issue was created automatically by the monthly audit workflow.*`,
              labels: ['audit', 'data-accuracy']
            });
